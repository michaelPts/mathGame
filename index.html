<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe-Abenteuer 🏝️</title>
<style>
  :root{
    --sand:#ffe9b3;
    --sea:#7fd8f7;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
    background:linear-gradient(180deg,var(--sea) 0%,#bdeaff 35%,var(--sand) 100%);
    overflow-x:hidden;
  }
  body{
    display:flex;
    justify-content:center;
    padding:20px 12px 60px;
  }
  .app{
    width:100%;
    max-width:520px;
    text-align:center;
    position:relative;
  }
  .sound-toggle{
    position:absolute;
    top:0; right:0;
    font-size:22px;
    background:#ffffffcc;
    border:2px solid #e0b96a;
    border-radius:50%;
    width:44px; height:44px;
    cursor:pointer;
    line-height:1;
  }
  .sound-toggle:active{ transform:translateY(1px); }
  h1{
    font-size:clamp(24px,6vw,34px);
    color:#3d2b1f;
    text-shadow:1px 1px 0 #fff8;
    margin:6px 0 18px;
  }

  /* ---------- Chest ---------- */
  .chest-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:18px;
  }
  .chest{
    width:180px;
    position:relative;
    transition:transform .1s;
  }
  .chest.shake{ animation: chestShake .5s; }
  @keyframes chestShake{
    10%,90%{transform:translateX(-5px) rotate(-1deg);}
    20%,80%{transform:translateX(7px) rotate(1deg);}
    30%,50%,70%{transform:translateX(-9px);}
    40%,60%{transform:translateX(9px);}
  }
  .chest-lid{
    height:38px;
    border-radius:16px 16px 6px 6px;
    background:linear-gradient(180deg,#a9682f,#7a4a1e);
    border:3px solid #5c3512;
    position:relative;
    z-index:2;
  }
  .chest-lid::after{
    content:"";
    position:absolute;
    left:50%; top:60%;
    width:26px;height:18px;
    background:radial-gradient(circle at 35% 30%,#ffe082,#c9971c 70%);
    border:2px solid #7a5b12;
    border-radius:6px;
    transform:translate(-50%,0);
  }
  .chest-body{
    min-height:76px;
    background:linear-gradient(180deg,#8a5a26,#5c3512);
    border:3px solid #4a2a0d;
    border-top:none;
    border-radius:0 0 14px 14px;
    padding:10px 8px 8px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .coin-pile{
    display:flex;
    flex-wrap:wrap-reverse;
    justify-content:center;
    gap:3px;
    width:100%;
    min-height:20px;
  }
  .coin-dot{
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff6c8,#ffd700 55%,#b8860b 100%);
    box-shadow:0 1px 2px rgba(0,0,0,.4);
    animation:coinPop .25s ease-out;
  }
  @keyframes coinPop{
    0%{transform:scale(0);}
    70%{transform:scale(1.3);}
    100%{transform:scale(1);}
  }
  .coin-counter{
    margin-top:8px;
    font-size:22px;
    font-weight:bold;
    color:#5c3512;
    background:#fff9e6cc;
    padding:4px 14px;
    border-radius:20px;
    border:2px solid #e0b96a;
  }

  /* ---------- Game area ---------- */
  .game-area{
    background:#ffffffcc;
    border-radius:22px;
    padding:22px 18px 26px;
    box-shadow:0 6px 18px rgba(0,0,0,.15);
  }
  .problem{
    font-size:clamp(36px,10vw,54px);
    font-weight:bold;
    color:#2c3e50;
    margin-bottom:18px;
    letter-spacing:2px;
  }
  form{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }
  #answerInput{
    width:120px;
    font-size:28px;
    text-align:center;
    padding:8px 6px;
    border-radius:14px;
    border:3px solid #7fd8f7;
    outline:none;
  }
  #answerInput:focus{ border-color:#3d9fd6; }
  #answerInput.wrong-shake{ animation: inputShake .4s; border-color:#e74c3c; }
  @keyframes inputShake{
    20%,60%{transform:translateX(-6px);}
    40%,80%{transform:translateX(6px);}
  }
  button{
    font-size:22px;
    font-family:inherit;
    padding:8px 20px;
    border-radius:14px;
    border:none;
    background:linear-gradient(180deg,#6be675,#2ecc71);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 3px 0 #219150;
  }
  button:active{ transform:translateY(2px); box-shadow:0 1px 0 #219150; }
  button:disabled{ opacity:.6; cursor:default; }

  .feedback{
    min-height:34px;
    margin-top:16px;
    font-size:22px;
    font-weight:bold;
  }
  .feedback.correct-msg{ color:#27ae60; animation: popMessage .5s ease; }
  .feedback.wrong-msg{ color:#e74c3c; animation: popMessage .5s ease; }
  @keyframes popMessage{
    0%{transform:scale(.4);opacity:0;}
    60%{transform:scale(1.15);opacity:1;}
    100%{transform:scale(1);}
  }

  /* ---------- Flying coin ---------- */
  .flying-coin{
    position:fixed;
    width:32px;height:32px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff6c8,#ffd700 55%,#b8860b 100%);
    box-shadow:0 0 10px 2px rgba(255,215,0,.7);
    z-index:200;
    pointer-events:none;
  }

  /* ---------- FX layer ---------- */
  .fx-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:150;
  }
  .confetti{
    position:absolute;
    width:10px;height:14px;
    opacity:.95;
    animation:confettiFall 1.1s ease-out forwards;
  }
  @keyframes confettiFall{
    0%{transform:translate(0,0) rotate(0deg);opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0;}
  }
  .star-particle{
    position:absolute;
    left:50%; top:38%;
    font-size:24px;
    animation:starOut .9s ease-out forwards;
  }
  @keyframes starOut{
    0%{transform:translate(-50%,-50%) scale(.3) rotate(0deg);opacity:1;}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.3) rotate(180deg);opacity:0;}
  }
  .rain-emoji{
    position:absolute;
    top:-30px;
    font-size:26px;
    animation:rainFall linear forwards;
  }
  @keyframes rainFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(80vh) rotate(300deg);opacity:0;}
  }
  .spark{
    position:absolute;
    left:50%; top:40%;
    width:10px;height:10px;
    border-radius:50%;
    animation:sparkOut .8s ease-out forwards;
  }
  @keyframes sparkOut{
    0%{transform:translate(-50%,-50%) scale(.2);opacity:1;}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1);opacity:0;}
  }
</style>
</head>
<body>
<div class="app">
  <button id="soundToggle" class="sound-toggle" type="button" aria-label="Ton an/aus">🔊</button>
  <h1>🏝️ Mathe-Abenteuer</h1>

  <div class="chest-area">
    <div class="chest" id="chest">
      <div class="chest-lid"></div>
      <div class="chest-body">
        <div class="coin-pile" id="coinPile"></div>
      </div>
    </div>
    <div class="coin-counter">🪙 <span id="coinCount">0</span></div>
  </div>

  <div class="game-area">
    <div class="problem" id="problem">?</div>
    <form id="answerForm" autocomplete="off">
      <input type="text" id="answerInput" inputmode="numeric" pattern="[0-9]*" autofocus />
      <button type="submit">Antworten ✔️</button>
    </form>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<div class="fx-layer" id="fxLayer"></div>

<script>
(function(){
  const problemEl = document.getElementById('problem');
  const form = document.getElementById('answerForm');
  const input = document.getElementById('answerInput');
  const feedback = document.getElementById('feedback');
  const chestEl = document.getElementById('chest');
  const coinPile = document.getElementById('coinPile');
  const coinCountEl = document.getElementById('coinCount');
  const fxLayer = document.getElementById('fxLayer');
  const submitBtn = form.querySelector('button');

  const soundToggle = document.getElementById('soundToggle');
  const COIN_PILE_CAP = 20;
  let coinCount = parseInt(localStorage.getItem('matheCoins') || '0', 10);
  let current = null;
  let lastKey = null;
  let soundOn = localStorage.getItem('matheSound') !== 'off';

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  /* ---------- Sound ---------- */
  let audioCtx = null;
  function ensureAudioCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    return audioCtx;
  }

  function tone(freq, startTime, duration, type, vol){
    const ctx = ensureAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + startTime;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol || 0.2, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  }

  function playCorrectSound(){
    if(!soundOn) return;
    tone(523.25, 0, 0.12, 'triangle');
    tone(659.25, 0.1, 0.12, 'triangle');
    tone(783.99, 0.2, 0.12, 'triangle');
    tone(1046.5, 0.3, 0.25, 'triangle');
  }

  function playWrongSound(){
    if(!soundOn) return;
    tone(220, 0, 0.18, 'sawtooth', 0.15);
    tone(160, 0.15, 0.28, 'sawtooth', 0.15);
  }

  function playCoinSound(){
    if(!soundOn) return;
    tone(1500, 0, 0.06, 'square', 0.12);
    tone(1900, 0.05, 0.09, 'square', 0.12);
  }

  soundToggle.textContent = soundOn ? '🔊' : '🔇';
  soundToggle.addEventListener('click', () => {
    soundOn = !soundOn;
    localStorage.setItem('matheSound', soundOn ? 'on' : 'off');
    soundToggle.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) ensureAudioCtx();
  });

  function updateCoinCount(){
    coinCountEl.textContent = coinCount;
    localStorage.setItem('matheCoins', String(coinCount));
  }

  function renderInitialPile(){
    const dots = Math.min(coinCount, COIN_PILE_CAP);
    for(let i=0;i<dots;i++){
      const d = document.createElement('div');
      d.className = 'coin-dot';
      coinPile.appendChild(d);
    }
  }

  function generateProblem(){
    let op, a, b, result;
    do{
      op = Math.random() < 0.5 ? '+' : '−';
      if(op === '+'){
        result = randInt(0, 50);
        a = randInt(0, result);
        b = result - a;
      } else {
        a = randInt(0, 50);
        b = randInt(0, a);
        result = a - b;
      }
    } while((a === 0 && b === 0) || `${a}${op}${b}` === lastKey);
    lastKey = `${a}${op}${b}`;
    return {a, b, op, result};
  }

  function newProblem(){
    feedback.textContent = '';
    feedback.className = 'feedback';
    input.value = '';
    input.classList.remove('wrong-shake');
    input.disabled = false;
    submitBtn.disabled = false;
    current = generateProblem();
    problemEl.textContent = `${current.a} ${current.op} ${current.b} = ?`;
    input.focus();
  }

  /* ---------- Particle effects ---------- */
  function confettiBurst(){
    const colors = ['#ff6b6b','#feca57','#1dd1a1','#54a0ff','#ff9ff3','#a29bfe'];
    for(let i=0;i<24;i++){
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = (45 + Math.random()*10) + '%';
      el.style.top = '35%';
      el.style.background = colors[randInt(0, colors.length-1)];
      el.style.setProperty('--dx', (Math.random()*300-150) + 'px');
      el.style.setProperty('--dy', (Math.random()*220+120) + 'px');
      el.style.setProperty('--rot', (Math.random()*720-360) + 'deg');
      el.style.animationDelay = (Math.random()*0.15) + 's';
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function starBurst(){
    const symbols = ['⭐','✨','🌟'];
    for(let i=0;i<16;i++){
      const angle = (i/16) * Math.PI * 2 + (Math.random()*0.3);
      const dist = 90 + Math.random()*70;
      const el = document.createElement('div');
      el.className = 'star-particle';
      el.textContent = symbols[randInt(0, symbols.length-1)];
      el.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
      el.style.setProperty('--dy', (Math.sin(angle)*dist) + 'px');
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function emojiRain(){
    const symbols = ['🎉','🥳','✨','🌟','🍭','🎈'];
    for(let i=0;i<14;i++){
      const el = document.createElement('div');
      el.className = 'rain-emoji';
      el.textContent = symbols[randInt(0, symbols.length-1)];
      el.style.left = (10 + Math.random()*80) + '%';
      el.style.animationDuration = (0.9 + Math.random()*0.5) + 's';
      el.style.animationDelay = (Math.random()*0.2) + 's';
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function fireworks(){
    const colors = ['#ff6b6b','#feca57','#1dd1a1','#54a0ff','#ff9ff3','#ffd700'];
    for(let burst=0; burst<3; burst++){
      const cx = 30 + Math.random()*40;
      const cy = 25 + Math.random()*30;
      for(let i=0;i<10;i++){
        const angle = (i/10) * Math.PI * 2;
        const dist = 50 + Math.random()*40;
        const el = document.createElement('div');
        el.className = 'spark';
        el.style.left = cx + '%';
        el.style.top = cy + '%';
        el.style.background = colors[randInt(0, colors.length-1)];
        el.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
        el.style.setProperty('--dy', (Math.sin(angle)*dist) + 'px');
        el.style.animationDelay = (burst*0.12) + 's';
        fxLayer.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }
  }

  const effects = [confettiBurst, starBurst, emojiRain, fireworks];
  const messages = ['Super gemacht! 🎉','Klasse! 🥳','Toll! ⭐','Wow, richtig! 🌟','Genial! 🚀','Fantastisch! 🏆'];

  function playCorrectAnimation(callback){
    feedback.textContent = messages[randInt(0, messages.length-1)];
    feedback.className = 'feedback correct-msg';
    playCorrectSound();
    effects[randInt(0, effects.length-1)]();
    setTimeout(callback, 1000);
  }

  /* ---------- Coin flight ---------- */
  function flyCoinToChest(onDone){
    const startRect = problemEl.getBoundingClientRect();
    const pileRect = coinPile.getBoundingClientRect();
    const size = 32;
    const startX = startRect.left + startRect.width/2 - size/2;
    const startY = startRect.top + startRect.height/2 - size/2;
    const endX = pileRect.left + pileRect.width/2 - size/2;
    const endY = pileRect.top + pileRect.height/2 - size/2;
    const dx = endX - startX;
    const dy = endY - startY;

    const coin = document.createElement('div');
    coin.className = 'flying-coin';
    coin.style.left = startX + 'px';
    coin.style.top = startY + 'px';
    document.body.appendChild(coin);

    const anim = coin.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx*0.5}px, ${dy*0.5 - 70}px) scale(1.15)`, opacity: 1, offset: 0.5 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.5)`, opacity: 0.9 }
    ], { duration: 700, easing: 'ease-in-out' });

    anim.onfinish = () => {
      coin.remove();
      if(coinPile.children.length < COIN_PILE_CAP){
        const dot = document.createElement('div');
        dot.className = 'coin-dot';
        coinPile.appendChild(dot);
      }
      coinCount++;
      updateCoinCount();
      playCoinSound();
      onDone && onDone();
    };
  }

  function loseCoin(onDone){
    chestEl.classList.add('shake');
    setTimeout(() => chestEl.classList.remove('shake'), 500);

    if(coinCount <= 0){
      onDone && onDone();
      return;
    }
    if(coinPile.lastElementChild){
      coinPile.lastElementChild.remove();
    }
    coinCount--;
    updateCoinCount();

    const rect = chestEl.getBoundingClientRect();
    const size = 32;
    const coin = document.createElement('div');
    coin.className = 'flying-coin';
    coin.style.left = (rect.left + rect.width/2 - size/2) + 'px';
    coin.style.top = (rect.top + rect.height/2 - size/2) + 'px';
    document.body.appendChild(coin);

    const anim = coin.animate([
      { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
      { transform: 'translate(-20px, 60px) rotate(-90deg)', opacity: 0.7 },
      { transform: 'translate(10px, 130px) rotate(180deg)', opacity: 0 }
    ], { duration: 650, easing: 'ease-in' });

    anim.onfinish = () => {
      coin.remove();
      onDone && onDone();
    };
  }

  /* ---------- Main loop ---------- */
  form.addEventListener('submit', function(e){
    e.preventDefault();
    if(input.disabled) return;

    const val = parseInt(input.value, 10);
    if(isNaN(val)){
      input.classList.add('wrong-shake');
      setTimeout(() => input.classList.remove('wrong-shake'), 400);
      return;
    }

    input.disabled = true;
    submitBtn.disabled = true;

    if(val === current.result){
      playCorrectAnimation(() => {
        flyCoinToChest(() => {
          setTimeout(newProblem, 350);
        });
      });
    } else {
      feedback.textContent = `Fast! Richtig wäre: ${current.a} ${current.op} ${current.b} = ${current.result}`;
      feedback.className = 'feedback wrong-msg';
      input.classList.add('wrong-shake');
      playWrongSound();
      loseCoin(() => {
        setTimeout(newProblem, 1300);
      });
    }
  });

  renderInitialPile();
  updateCoinCount();
  newProblem();
})();
</script>
</body>
</html>
